<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password — WoodTrack</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Poppins','sans-serif']}}}}</script>
  <style>
    body{margin:0;min-height:100vh;font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#eff6ff,#fef3c7 45%,#f8fafc);display:flex;align-items:center;justify-content:center;padding:24px}
    .auth-card{max-width:440px;width:100%;background:#fff;border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 24px 50px rgba(15,23,42,.08);overflow:hidden}
    .auth-card header{padding:32px 28px 18px}
    .auth-card main{padding:0 28px 32px;display:grid;gap:18px}
    .auth-card h1{margin:0;font-size:1.8rem;line-height:1.1;color:#0f172a}
    .auth-card p{margin:12px 0 0;color:#475569;line-height:1.75}
    .field{width:100%;padding:14px 16px;border:1.5px solid #e2e8f0;border-radius:14px;font-size:14px;color:#0f172a;outline:none;transition:border-color .15s}
    .field:focus{border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.1)}
    .btn-primary{width:100%;padding:14px 18px;background:#1e3a8a;color:#fff;font-weight:700;border:none;border-radius:14px;cursor:pointer;transition:background .2s}
    .btn-primary:hover{background:#2563eb}
    .message{padding:16px;border-radius:16px;background:#eff6ff;color:#134e8a;font-weight:600}
    .link-row{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:14px}
    .link-row a{color:#1e3a8a;font-weight:600}
    .footer-note{padding:18px 28px 26px;background:#f8fafc;color:#64748b;font-size:13px;text-align:center}
  </style>
</head>
<body>
  <div class="auth-card">
    <header>
      <p style="font-size:12px;font-weight:700;color:#1e3a8a;text-transform:uppercase;letter-spacing:.15em;margin-bottom:10px">Reset Kata Sandi</p>
      <h1>Kirim tautan pemulihan</h1>
      <p>Masukkan email Anda untuk menerima instruksi reset password.</p>
    </header>
    <main>
      <label><span style="font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em">Alamat email</span><input class="field" type="email" placeholder="admin@woodtrack.local" required id="email"></label>
      <button class="btn-primary" onclick="sendReset()">Kirim tautan</button>
      <div class="message" id="successMessage" style="display:none">Jika email terdaftar, tautan reset telah dikirim. Silakan periksa inbox Anda.</div>
      <div class="link-row"><a href="login.html">Kembali ke Login</a><a href="index.html">Beranda</a></div>
    </main>
    <div class="footer-note">Periksa folder spam jika email tidak muncul dalam beberapa menit.</div>
  </div>
  <script>
    function sendReset(){
      const email=document.getElementById('email');
      if(!email.value.trim()){alert('Masukkan alamat email yang valid.');return}
      document.getElementById('successMessage').style.display='block';
    }
  </script>
</body>
</html>
